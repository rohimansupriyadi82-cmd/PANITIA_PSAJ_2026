<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USP & PSAJ Precision - F4 Edition (Paten Storage)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 360px;
            --primary: #064e3b;
            --primary-dark: #022c22;
            --accent: #10b981;
            --bg-canvas: #f1f5f9;
            --light-green: #dcfce7; 
            --purple-shaded: #b4a7d6; 
        }

        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; display: flex;
            background-color: var(--bg-canvas); color: #1e293b;
        }

        /* SIDEBAR STYLING - PERTAHANKAN STRUKTUR */
        .sidebar {
            width: var(--sidebar-width); height: 100vh;
            background: var(--primary); position: fixed;
            left: 0; top: 0; display: flex; flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.2); z-index: 1000; color: #ffffff;
        }
        .sidebar-header { padding: 25px; background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h3 { margin: 0; font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        
        .nav-tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; background: rgba(0,0,0,0.2); padding: 5px; margin: 10px 15px; border-radius: 10px; gap: 5px; }
        .nav-btn { padding: 10px 2px; border: none; border-radius: 8px; background: transparent; color: white; font-size: 8.5px; font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .nav-btn.active { background: var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .sidebar-content { flex: 1; overflow-y: auto; padding: 15px; }
        .accordion-item { background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        .accordion-header { padding: 14px 18px; cursor: pointer; font-weight: 700; font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .accordion-header.active { background: rgba(255,255,255,0.1); }
        .accordion-content { padding: 0 18px; max-height: 0; overflow: hidden; transition: 0.4s ease-out; background: rgba(0,0,0,0.1); }
        .accordion-content.show { padding: 18px; max-height: 5000px; }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 9px; font-weight: 800; margin-bottom: 4px; text-transform: uppercase; opacity: 0.7; color: #fff; }
        .form-group input, .form-group select { width: 100%; padding: 9px; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; font-size: 12px; background: rgba(255,255,255,0.1); color: white; outline: none; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; text-transform: uppercase; transition: 0.3s; }
        .btn-blue { background: var(--accent); color: white; }
        .btn-outline { border: 1px solid rgba(255,255,255,0.3); background: transparent; color: #ffffff; }

        .created-by { text-align: center; font-size: 10px; opacity: 0.5; margin-top: 10px; padding-bottom: 20px; font-weight: 600; letter-spacing: 1px; }

        /* PREVIEW AREA */
        .main-content { margin-left: var(--sidebar-width); flex-grow: 1; padding: 30px; display: flex; flex-direction: column; align-items: center; }

        .page {
            width: 215mm; height: 330mm;
            padding: 8mm 12mm; 
            background: white;
            box-shadow: 0 10px 50px rgba(0,0,0,0.1);
            position: relative; margin-bottom: 30px;
            display: flex; flex-direction: column;
            overflow: hidden; 
            page-break-after: always; color: #000;
        }

        .header { text-align: center; border-bottom: 3.5pt double #000; padding-bottom: 8px; margin-bottom: 10px; position: relative; flex-shrink: 0; }
        .logo-img { position: absolute; left: 0; top: 0; width: 25mm; height: 30mm; object-fit: contain; }
        .header h1 { margin: 0; font-size: 15pt; text-transform: uppercase; line-height: 1.1; font-weight: 700; letter-spacing: 0.5px; }
        .header h2 { margin: 2px 0; font-size: 24pt; font-weight: 900; text-transform: uppercase; line-height: 1; letter-spacing: 1px; }
        .header p { margin: 1px 0; font-size: 9pt; font-weight: 600; line-height: 1.3; }

        .photo-grid { display: grid; gap: 5mm 5mm; justify-content: center; flex-grow: 1; align-content: flex-start; width: 100%; margin-top: 2mm; }

        .student-card { width: 40mm; display: flex; flex-direction: column; align-items: center; }
        .photo-frame { width: 30mm; height: 35mm; border: 1.2pt solid #000; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        .id-label { margin-top: 3px; background: #ffff00 !important; border: 1.2pt solid #000; width: 38mm; text-align: center; font-weight: 800; font-size: 8.5pt; padding: 2px 0; }
        .nisn-label { font-size: 7.5pt; font-weight: 700; margin-top: 1px; }

        .denah-card { width: 42mm; height: 42mm; border: 1.5pt solid #000; display: flex; flex-direction: column; background: #fff; overflow: hidden; }
        .denah-row-1 { border-bottom: 1pt solid #000; text-align: center; font-size: 7.5pt; font-weight: 800; padding: 2px 0; background: #eee !important; }
        .denah-row-2 { border-bottom: 1pt solid #000; text-align: center; font-size: 10.5pt; font-weight: 900; padding: 3px 0; }
        .denah-row-bottom { display: flex; flex-grow: 1; }
        .denah-box-photo { flex: 1; border-right: 1pt solid #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .denah-box-photo img { width: 100%; height: 100%; object-fit: cover; }
        .denah-box-name { flex: 1.2; background: var(--purple-shaded) !important; display: flex; align-items: center; justify-content: center; padding: 3px; text-align: center; font-size: 7pt; font-weight: 800; line-height: 1.1; text-transform: uppercase; word-break: break-word; }

        .abs-table { width: 100%; border-collapse: collapse; border: 1.5pt solid #000; table-layout: fixed; }
        .abs-table th { background: #f1f5f9 !important; border: 1pt solid #000; padding: 6px 4px; font-size: 9pt; text-transform: uppercase; font-weight: 800; }
        .abs-table td { border: 1pt solid #000; padding: 3px 8px; font-size: 9.5pt; height: 9.8mm; vertical-align: middle; }
        .zigzag-ttd { display: flex; align-items: center; width: 100%; height: 100%; font-size: 9pt; font-weight: 700; }

        .footer-sig { 
            margin-top: 4mm; 
            display: flex; 
            justify-content: flex-end; 
            width: 100%; 
            padding-bottom: 4mm; 
        }
        .sig-container { display: flex; justify-content: space-between; width: 100%; }
        .sig-box { min-width: 65mm; font-size: 11pt; text-align: center; line-height: 1.3; }

        @media print {
            @page { size: 215mm 330mm; margin: 0; }
            body { background: white; }
            .sidebar, .no-print { display: none !important; }
            .main-content { margin: 0; padding: 0; }
            .page { box-shadow: none; margin: 0; border: none; width: 215mm; height: 330mm; padding: 8mm 12mm; page-break-after: always; }
            .id-label { background-color: #ffff00 !important; -webkit-print-color-adjust: exact; }
            .denah-box-name { background-color: #b4a7d6 !important; -webkit-print-color-adjust: exact; }
            .abs-table tbody tr:nth-child(even) { background-color: #dcfce7 !important; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body>

    <div class="sidebar no-print">
        <div class="sidebar-header">
            <h3>PSAJ PRECISION F4</h3>
        </div>

        <div class="nav-tabs">
            <button class="nav-btn active" id="tab-main" onclick="switchMode('main')">Album & Denah</button>
            <button class="nav-btn" id="tab-absen" onclick="switchMode('absen')">Daftar Hadir</button>
            <button class="nav-btn" id="tab-pengawas" onclick="switchMode('pengawas')">Pengawas</button>
        </div>

        <div class="sidebar-content">
            <div id="common-settings">
                <div class="accordion-item">
                    <div class="accordion-header active" onclick="toggleAccordion(this)"><i>🏢 DATA INSTANSI (SENTRAL)</i><span>▼</span></div>
                    <div class="accordion-content show">
                        <div class="form-group"><label>Status Sekolah</label><select id="in-status" onchange="handleStatusChange()"><option value="negeri">Negeri (Kab. Bekasi)</option><option value="swasta">Swasta (Kustom)</option></select></div>
                        <div class="form-group" id="yayasan-group" style="display:none;"><label>Nama Yayasan</label><input type="text" id="in-yayasan" value="YAYASAN PENDIDIKAN ISLAM" oninput="saveAndRefresh()"></div>
                        <div class="form-group" id="logo-upload-group" style="display:none;"><label>Upload Logo</label><input type="file" id="in-logo" accept="image/*" onchange="handleLogo(this)"></div>
                        <div class="form-group"><label>Nama Sekolah</label><input type="text" id="in-school" value="SDN MUARA BAKTI 01" oninput="saveAndRefresh()"></div>
                        <div class="form-group"><label>Kecamatan</label><input type="text" id="in-dist" value="KECAMATAN BABELAN" oninput="saveAndRefresh()"></div>
                        <div class="form-group"><label>Alamat</label><input type="text" id="in-addr" value="Jl. Bayangkara Rt. 12/07 Ds. Muara Bakti Kec. Babelan Kab. Bekasi" oninput="saveAndRefresh()"></div>
                        <div class="form-group"><label>Email</label><input type="text" id="in-email" value="sdnmuarabakti01@gmail.com" oninput="saveAndRefresh()"></div>
                        <div class="form-group"><label>Tahun Pelajaran</label><input type="text" id="in-year" value="2025/2026" oninput="saveAndRefresh()"></div>
                    </div>
                </div>
            </div>

            <div id="panel-main">
                <div class="accordion-item">
                    <div class="accordion-header active" onclick="toggleAccordion(this)"><i>🖼️ SETTING ALBUM & DENAH</i><span>▼</span></div>
                    <div class="accordion-content show">
                        <button class="btn btn-blue" onclick="saveAndRefresh()">💾 SIMPAN KONFIGURASI PATEN</button>
                        <button class="btn btn-outline" onclick="downloadTemplate()">📥 Template Excel</button>
                        <div class="form-group"><label>1. Upload Excel</label><input type="file" id="import-excel" accept=".xlsx, .xls"></div>
                        <div class="form-group"><label>2. Upload ZIP/File Foto</label><input type="file" id="import-photos" multiple accept="image/*, .zip"></div>
                        <hr style="border: 0.5px solid rgba(255,255,255,0.1);">
                        <div class="form-group"><label>Judul Album Foto</label><input type="text" id="title-album" value="ALBUM FOTO PENILAIAN SUMATIF AKHIR JENJANG (PSAJ)" oninput="saveAndRefresh()"></div>
                        <div class="form-group"><label>Judul Denah Tempat Duduk</label><input type="text" id="title-denah" value="DENAH TEMPAT DUDUK PENILAIAN SUMATIF AKHIR JENJANG (PSAJ)" oninput="saveAndRefresh()"></div>
                        <div class="form-group"><label>Mode Dokumen</label><select id="in-mode" onchange="saveAndRefresh()"><option value="album">Album Foto Peserta</option><option value="denah">Denah Kursi Peserta</option></select></div>
                        <div class="form-group"><label>Tata Letak (Urutan)</label><select id="in-layout" onchange="saveAndRefresh()"><option value="zigzag">Zigzag (U-Turn)</option><option value="vertical">Vertical (Kolom)</option></select></div>
                        <div class="form-group"><label>Siswa Per Halaman</label><select id="in-perpage" onchange="saveAndRefresh()"><option value="20">20 Siswa (4 Kolom)</option><option value="15">15 Siswa (3 Kolom)</option></select></div>
                        <div class="form-group"><label>Ruangan Mulai</label><input type="number" id="in-room" value="1" oninput="saveAndRefresh()"></div>
                    </div>
                </div>
            </div>

            <div id="panel-absen" style="display:none;">
                <div class="accordion-item">
                    <div class="accordion-header active" onclick="toggleAccordion(this)"><i>📝 LIST PENGAWAS PER RUANG</i><span>▼</span></div>
                    <div class="accordion-content show">
                        <div class="form-group"><label>Judul Daftar Hadir</label><input type="text" id="title-absen" value="DAFTAR HADIR PESERTA PENILAIAN SUMATIF AKHIR JENJANG (PSAJ)" oninput="saveAndRefresh()"></div>
                        <div class="form-group"><label>Mata Pelajaran</label><input type="text" id="abs-mapel" value="BAHASA INDONESIA" oninput="saveAndRefresh()"></div>
                        <div class="form-group"><label>Hari, Tanggal</label><input type="text" id="abs-date" value="Senin, 11 Mei 2026" oninput="saveAndRefresh()"></div>
                        <div class="form-group"><label>Waktu</label><input type="text" id="abs-time" value="08.00 - 09.30" oninput="saveAndRefresh()"></div>
                        
                        <div class="form-group">
                            <label>Jumlah Pengawas Per Ruang</label>
                            <select id="abs-p-mode" onchange="saveAndRefresh()">
                                <option value="1">1 Pengawas per Halaman</option>
                                <option value="2">2 Pengawas per Halaman</option>
                            </select>
                        </div>

                        <p style="font-size: 10px; color: #fbbf24; font-weight: 800; margin-bottom: 10px;">DATA PENGAWAS PER RUANGAN:</p>
                        
                        <!-- RUANG 1 - 4 Loop Logic -->
                        <div id="room-proctor-inputs">
                            <!-- JS Will Render here based on 1 or 2 proctors -->
                        </div>
                    </div>
                </div>
            </div>

            <div id="panel-pengawas" style="display:none;">
                <div class="accordion-item">
                    <div class="accordion-header active" onclick="toggleAccordion(this)"><i>👨‍🏫 DAFTAR HADIR PENGAWAS GABUNGAN</i><span>▼</span></div>
                    <div class="accordion-content show">
                        <div class="form-group"><label>Judul Daftar Hadir</label><input type="text" id="title-pengawas" value="DAFTAR HADIR PENGAWAS PENILAIAN SUMATIF AKHIR JENJANG (PSAJ)" oninput="saveAndRefresh()"></div>
                        <div class="form-group"><label>Mata Pelajaran</label><input type="text" id="p-mapel" value="BAHASA INDONESIA" oninput="saveAndRefresh()"></div>
                        <div class="form-group"><label>Ketua Panitia</label><input type="text" id="p-ketua" value="ROHIMAN KHAN" oninput="saveAndRefresh()"></div>
                        <div class="form-group"><label>NIP Ketua</label><input type="text" id="p-nip" value="198412182025211003" oninput="saveAndRefresh()"></div>
                        <div class="form-group">
                            <label>Format List</label>
                            <select id="p-format" onchange="togglePengawasInputs()"><option value="4" selected>4 Pengawas (2 Ruang)</option><option value="6">6 Pengawas (3 Ruang)</option></select>
                        </div>
                        <div id="p-inputs-container"></div>
                    </div>
                </div>
            </div>

            <button class="btn btn-blue" onclick="window.print()">🖨️ CETAK SEKARANG (F4)</button>
            <button class="btn btn-outline" style="background:#ef4444; color:white; border:none;" onclick="clearData()">🗑️ Hapus Data</button>
            <div class="created-by">Created Rohiman Supriyadi</div>
        </div>
    </div>

    <div class="main-content" id="pages-container"></div>

    <script>
        const LOGO_KAB_BEKASI = "https://freeimghost.com/images/2026/01/22/Kabupaten-Bekasi.md.png";
        let students = [];
        let photoMap = {};
        let schoolLogo = LOGO_KAB_BEKASI;
        let activeTab = 'main';

        const DB_NAME = "PSAJ_Database";
        const STORE_NAME = "AppData";

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function saveToDB() {
            const db = await initDB();
            const configData = {};
            document.querySelectorAll('input, select').forEach(el => { if(el.id && el.type !== 'file') configData[el.id] = el.value; });
            const transaction = db.transaction(STORE_NAME, "readwrite");
            const store = transaction.objectStore(STORE_NAME);
            store.put(students, "students");
            store.put(photoMap, "photoMap");
            store.put(schoolLogo, "schoolLogo");
            store.put(configData, "config");
        }

        async function loadFromDB() {
            const db = await initDB();
            const transaction = db.transaction(STORE_NAME, "readonly");
            const store = transaction.objectStore(STORE_NAME);
            store.get("students").onsuccess = (e) => { students = e.target.result || []; updateUI(); };
            store.get("photoMap").onsuccess = (e) => { photoMap = e.target.result || {}; updateUI(); };
            store.get("schoolLogo").onsuccess = (e) => { if(e.target.result) schoolLogo = e.target.result; updateUI(); };
            store.get("config").onsuccess = (e) => {
                const data = e.target.result;
                if(data) {
                    for (let id in data) { const el = document.getElementById(id); if (el) el.value = data[id]; }
                    handleStatusChange(false);
                    togglePengawasInputs(); 
                }
            };
        }

        async function clearData() { if(confirm("Hapus semua data permanen?")) { const db = await initDB(); const transaction = db.transaction(STORE_NAME, "readwrite"); transaction.objectStore(STORE_NAME).clear(); location.reload(); } }

        function saveAndRefresh() { 
            renderRoomProctorInputs();
            saveToDB(); 
            updateUI(); 
        }

        function renderRoomProctorInputs() {
            const container = document.getElementById('room-proctor-inputs');
            if(!container) return;
            const mode = document.getElementById('abs-p-mode').value;
            const currentVals = {};
            container.querySelectorAll('input').forEach(i => currentVals[i.id] = i.value);
            
            let html = '';
            for(let r=1; r<=4; r++) {
                html += `<div style="background: rgba(255,255,255,0.05); padding: 8px; border-radius: 5px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.2);">
                    <label style="font-size: 9px; color: #10b981;">RUANG 00${r}</label>
                    <input type="text" id="abs-p-name-r${r}" value="${currentVals[`abs-p-name-r${r}`] || ''}" placeholder="Pengawas 1" oninput="saveToDB(); updateUI()" style="margin-bottom:4px;">
                    <input type="text" id="abs-p-nip-r${r}" value="${currentVals[`abs-p-nip-r${r}`] || ''}" placeholder="NIP Pengawas 1" oninput="saveToDB(); updateUI()" style="margin-bottom:8px;">`;
                
                if(mode === '2') {
                    html += `<input type="text" id="abs-p2-name-r${r}" value="${currentVals[`abs-p2-name-r${r}`] || ''}" placeholder="Pengawas 2" oninput="saveToDB(); updateUI()" style="margin-bottom:4px;">
                             <input type="text" id="abs-p2-nip-r${r}" value="${currentVals[`abs-p2-nip-r${r}`] || ''}" placeholder="NIP Pengawas 2" oninput="saveToDB(); updateUI()">`;
                }
                html += `</div>`;
            }
            container.innerHTML = html;
        }

        function switchMode(m) {
            activeTab = m;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + m).classList.add('active');
            document.getElementById('panel-main').style.display = (m === 'main') ? 'block' : 'none';
            document.getElementById('panel-absen').style.display = (m === 'absen') ? 'block' : 'none';
            document.getElementById('panel-pengawas').style.display = (m === 'pengawas') ? 'block' : 'none';
            if(m === 'absen') renderRoomProctorInputs();
            updateUI();
        }

        function handleStatusChange(refresh = true) {
            const s = document.getElementById('in-status').value;
            document.getElementById('yayasan-group').style.display = (s === 'swasta') ? 'block' : 'none';
            document.getElementById('logo-upload-group').style.display = (s === 'swasta') ? 'block' : 'none';
            if (s !== 'swasta') schoolLogo = LOGO_KAB_BEKASI;
            if (refresh) saveAndRefresh();
        }

        function toggleAccordion(h) { h.classList.toggle('active'); h.nextElementSibling.classList.toggle('show'); }

        function handleLogo(input) { if (input.files && input.files[0]) { const reader = new FileReader(); reader.onload = (e) => { schoolLogo = e.target.result; saveAndRefresh(); }; reader.readAsDataURL(input.files[0]); } }

        function togglePengawasInputs() {
            let val = document.getElementById('p-format').value;
            let count = parseInt(val);
            const container = document.getElementById('p-inputs-container');
            const currentVals = {};
            container.querySelectorAll('input').forEach(i => currentVals[i.id] = i.value);
            container.innerHTML = '';
            for(let i=1; i<=count; i++) {
                const id = `p-name-${i}`;
                const val = currentVals[id] || "";
                container.innerHTML += `<div class="form-group"><label>Pengawas ${i}</label><input type="text" id="${id}" value="${val}" placeholder="Nama Pengawas ${i}" oninput="saveAndRefresh()"></div>`;
            }
            updateUI();
        }

        function updateUI() {
            const container = document.getElementById('pages-container');
            container.innerHTML = '';
            if (activeTab === 'pengawas') { container.innerHTML = renderPengawasPage(); return; }
            const perPage = parseInt(document.getElementById('in-perpage').value) || 20;
            const dataList = students.length > 0 ? students : Array(perPage).fill({ no: "00-00-00-00", nisn: "1234567890", nama: "CONTOH NAMA PESERTA" });
            for (let i = 0; i < dataList.length; i += perPage) {
                let chunk = dataList.slice(i, i + perPage);
                if (activeTab === 'main') container.innerHTML += renderMainPage(chunk, perPage, Math.floor(i/perPage));
                else container.innerHTML += renderAbsenPage(chunk, perPage, Math.floor(i/perPage));
            }
        }

        function renderKop() {
            const status = document.getElementById('in-status').value;
            const yayasan = document.getElementById('in-yayasan').value;
            const school = document.getElementById('in-school').value;
            const dist = document.getElementById('in-dist').value;
            const addr = document.getElementById('in-addr').value;
            const email = document.getElementById('in-email').value;
            let headerContent = (status === 'negeri') ? `<h1>PEMERINTAH KABUPATEN BEKASI</h1><h1>DINAS PENDIDIKAN</h1>` : `<h1>${yayasan}</h1>`;
            return `<div class="header"><img class="logo-img" src="${schoolLogo}">${headerContent}<h2>${school}</h2><h1>${dist}</h1><p>${addr}</p><p style="color:blue; text-decoration:underline; font-size:7.5pt;">Email: ${email}</p></div>`;
        }

        function renderMainPage(chunk, perPage, pageIdx) {
            const mode = document.getElementById('in-mode').value;
            const layout = document.getElementById('in-layout').value;
            const roomNum = (parseInt(document.getElementById('in-room').value) + pageIdx).toString().padStart(3, '0');
            const cols = (perPage == 15) ? 3 : 4;
            const rows = perPage / cols;
            let ordered = new Array(perPage).fill(null);
            if (layout === 'vertical') {
                let count = 0; for (let c = 0; c < cols; c++) { for (let r = 0; r < rows; r++) { if (count < chunk.length) ordered[r * cols + c] = chunk[count++]; } }
            } else { 
                let count = 0; for (let r = 0; r < rows; r++) { if (r % 2 === 0) { for (let c = 0; c < cols; c++) { if (count < chunk.length) ordered[r * cols + c] = chunk[count++]; } } else { for (let c = cols - 1; c >= 0; c--) { if (count < chunk.length) ordered[r * cols + c] = chunk[count++]; } } }
            }
            let gridHtml = '';
            ordered.forEach(s => {
                if(!s) { gridHtml += `<div style="visibility:hidden; width:40mm;"></div>`; return; }
                const img = photoMap[s.nisn] || photoMap[s.no] || "";
                const imgTag = img ? `<img src="${img}">` : `<div style="font-size:7pt; color:#ccc;">FOTO</div>`;
                if (mode === 'album') gridHtml += `<div class="student-card"><div class="photo-frame">${imgTag}</div><div class="id-label">${s.no}</div><div class="nisn-label">NISN: ${s.nisn}</div></div>`;
                else gridHtml += `<div class="denah-card"><div class="denah-row-1">NOMOR PESERTA</div><div class="denah-row-2">${s.no}</div><div class="denah-row-bottom"><div class="denah-box-photo">${imgTag}</div><div class="denah-box-name">${s.nama}</div></div></div>`;
            });
            const headerJudul = `<div style="text-align:center; margin-bottom:5px;"><div style="display:inline-block; padding:3px 15px; font-weight:800; font-size:12pt; text-transform:uppercase;">${mode === 'album' ? document.getElementById('title-album').value : document.getElementById('title-denah').value}</div><div style="margin-top:3px; font-weight:700; font-size:10pt;">RUANGAN: <span style="font-size:14pt; font-weight:900;">${roomNum}</span></div></div>`;
            const mejaPengawas = mode === 'denah' ? `<div style="margin-left:10mm; margin-bottom:8px; font-weight:900; font-size:11pt; text-transform:uppercase;">MEJA PENGAWAS</div>` : '';
            return `<div class="page">${renderKop()}${headerJudul}${mejaPengawas}<div class="photo-grid" style="grid-template-columns: repeat(${cols}, 1fr);">${gridHtml}</div></div>`;
        }

        function renderAbsenPage(chunk, perPage, pageIdx) {
            const startRoom = parseInt(document.getElementById('in-room').value);
            const actualRoom = startRoom + pageIdx;
            const roomNum = actualRoom.toString().padStart(3, '0');
            const pMode = document.getElementById('abs-p-mode').value;

            const p1Name = document.getElementById(`abs-p-name-r${actualRoom}`)?.value || "....................................";
            const p1Nip = document.getElementById(`abs-p-nip-r${actualRoom}`)?.value || "....................................";
            const p2Name = document.getElementById(`abs-p2-name-r${actualRoom}`)?.value || "....................................";
            const p2Nip = document.getElementById(`abs-p2-nip-r${actualRoom}`)?.value || "....................................";

            let rowsHtml = '';
            chunk.forEach((s, i) => {
                const num = (pageIdx * perPage) + i + 1;
                const ttd = num % 2 !== 0 ? `${num}. .....................` : `<div style="padding-left:60px;">${num}. .....................</div>`;
                rowsHtml += `<tr><td align="center">${num}</td><td align="center" style="font-weight:700;">${s.no}</td><td style="text-transform:uppercase; font-weight:700; padding-left:10px;">${s.nama}</td><td><div class="zigzag-ttd">${ttd}</div></td></tr>`;
            });

            const titiMangsa = `Babelan, ${document.getElementById('abs-date').value.split(',')[1] || ''}`;
            let footerHtml = '';
            
            if(pMode === '1') {
                footerHtml = `<div class="footer-sig"><div class="sig-box">${titiMangsa}<br>Pengawas Ruang,<br><br><br><br><b>${p1Name}</b><br>NIP. ${p1Nip}</div></div>`;
            } else {
                footerHtml = `<div class="footer-sig">
                    <div class="sig-container">
                        <div class="sig-box"><br>Pengawas 1,<br><br><br><br><b>${p1Name}</b><br>NIP. ${p1Nip}</div>
                        <div class="sig-box">${titiMangsa}<br>Pengawas 2,<br><br><br><br><b>${p2Name}</b><br>NIP. ${p2Nip}</div>
                    </div>
                </div>`;
            }

            return `<div class="page">${renderKop()}<div style="text-align:center; font-weight:800; font-size:11pt; margin-bottom:10px; text-transform:uppercase;">${document.getElementById('title-absen').value}</div><table style="width:100%; font-weight:700; font-size:9.5pt; margin-bottom:8px;"><tr><td width="140">MATA PELAJARAN</td><td>: ${document.getElementById('abs-mapel').value}</td><td width="80">RUANG</td><td>: ${roomNum}</td></tr><tr><td>HARI, TANGGAL</td><td>: ${document.getElementById('abs-date').value}</td><td>TAHUN</td><td>: ${document.getElementById('in-year').value}</td></tr><tr><td>WAKTU</td><td colspan="3">: ${document.getElementById('abs-time').value}</td></tr></table><table class="abs-table"><thead><tr><th width="40">NO</th><th width="140">NO PESERTA</th><th>NAMA PESERTA</th><th width="200">TANDA TANGAN</th></tr></thead><tbody>${rowsHtml}</tbody></table>${footerHtml}</div>`;
        }

        function renderPengawasPage() {
            const format = document.getElementById('p-format').value;
            let count = parseInt(format);
            let rowsHtml = ''; 
            for(let i=1; i<=count; i++) {
                const name = document.getElementById(`p-name-${i}`)?.value || "....................................";
                let roomCell = (i % 2 !== 0) ? `<td rowspan="2" align="center" style="font-size:20pt; font-weight:900;">${Math.ceil(i/2)}</td>` : '';
                const ttd = (i % 2 !== 0) ? `${i}. .....................` : `<div style="padding-left:60px;">${i}. .....................</div>`;
                rowsHtml += `<tr><td align="center">${i}.</td><td style="text-transform:uppercase; font-weight:700;">${name}</td>${roomCell}<td><div class="zigzag-ttd">${ttd}</div></td></tr>`;
            }
            return `<div class="page">${renderKop()}<div style="text-align:center; font-weight:800; font-size:12pt; margin-bottom:15px; text-transform:uppercase;">${document.getElementById('title-pengawas').value}</div><div style="margin-left: 20px; margin-bottom: 15px; font-weight: 700; font-size: 10pt;"><table><tr><td width="150">Mata Pelajaran</td><td>: ${document.getElementById('p-mapel').value}</td></tr><tr><td>Hari/Tanggal</td><td>: ${document.getElementById('abs-date').value}</td></tr></table></div><table class="abs-table"><thead><tr><th width="50">No.</th><th>Nama Pengawas</th><th width="80">Ruang</th><th width="220">Tanda Tangan</th></tr></thead><tbody>${rowsHtml}</tbody></table><div class="footer-sig"><div class="sig-box">Ketua Panitia Pelaksana<br><br><br><br><br><u><b>${document.getElementById('p-ketua').value}</b></u><br>NIP. ${document.getElementById('p-nip').value}</div></div></div>`;
        }

        document.getElementById('import-excel').addEventListener('change', function(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
                students = json.slice(1).filter(r => r[0]).map(r => ({ no: String(r[0]).trim(), nisn: String(r[1]||'').trim(), nama: String(r[2]||'').trim() }));
                saveAndRefresh();
                alert("Import Berhasil!");
            };
            reader.readAsArrayBuffer(file);
        });

        document.getElementById('import-photos').addEventListener('change', async function(e) {
            for (let f of e.target.files) {
                if (f.name.toLowerCase().endsWith('.zip')) {
                    const zip = await JSZip.loadAsync(f);
                    for (let filename in zip.files) {
                        const fileData = zip.files[filename];
                        if (!fileData.dir) {
                            const b64 = await fileData.async("base64");
                            const key = filename.split('/').pop().split('.')[0].trim();
                            photoMap[key] = "data:image/jpeg;base64," + b64;
                        }
                    }
                } else {
                    const reader = new FileReader();
                    reader.onload = (ev) => { const key = f.name.split('.')[0].trim(); photoMap[key] = ev.target.result; saveAndRefresh(); };
                    reader.readAsDataURL(f);
                }
            }
            saveAndRefresh();
            alert("Foto Berhasil Diproses!");
        });

        function downloadTemplate() { const wb = XLSX.utils.book_new(); const ws = XLSX.utils.aoa_to_sheet([["No Peserta", "NISN", "Nama Peserta"], ["24-01-01-001", "1234567890", "NAMA PESERTA"]]); XLSX.utils.book_append_sheet(wb, ws, "Data"); XLSX.writeFile(wb, "Template_PSAJ.xlsx"); }
        window.onload = () => { loadFromDB(); };
    </script>
</body>

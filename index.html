<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel PSAJ 2026 - Rohiman Supriyadi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #010a10;
            --primary: #64ffda;
            --card-bg: rgba(255, 255, 255, 0.07);
            /* Variabel Warna Ikon */
            --c1: #00d2ff; --c2: #00ff87; --c3: #ff007a;
            --c4: #f6d365; --c5: #a18cd1; --c6: #00f2fe; --c7: #ffa502;
            --c8: #ff6b81; --c9: #7bed9f; --c10: #70a1ff; --c11: #ff9f43;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            height: 100vh; width: 100vw;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #000; 
            color: #fff;
            overflow: hidden;
        }

        /* PERBAIKAN: Menambah kecerahan video */
        .video-bg {
            position: fixed; top: 0; left: 0; 
            width: 100vw; height: 100vh;
            object-fit: cover; z-index: -2;
            filter: brightness(1.1) contrast(1.1); /* Membuat video lebih cerah dan kontras */
        }

        /* PERBAIKAN: Mengurangi kegelapan overlay agar video terlihat jelas */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* Mengubah opacity dari 0.4-0.7 menjadi 0.1-0.3 agar lebih transparan */
            background: linear-gradient(to bottom, rgba(1, 10, 16, 0.1), rgba(1, 10, 16, 0.3));
            z-index: -1;
        }

        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 75px;
            background: rgba(1, 10, 16, 0.85); backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--primary);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 999999;
        }

        .brand { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .brand img { height: 38px; }
        .brand-text b { color: #fff; font-size: 15px; display: block; }
        .brand-text span { color: var(--primary); font-size: 10px; font-weight: 800; text-transform: uppercase; }

        #homeBtn {
            background: #ff4757; color: #fff;
            border: none; padding: 10px 18px; border-radius: 10px;
            font-weight: 800; font-size: 12px; cursor: pointer;
            display: none; box-shadow: 0 0 15px rgba(255, 71, 87, 0.4);
            transition: 0.3s;
        }
        #homeBtn:hover { background: #ff6b81; transform: scale(1.05); }

        #dashboard-view {
            margin-top: 75px; height: calc(100vh - 75px);
            width: 100%; padding: 30px 20px;
            overflow-y: auto; display: flex; flex-direction: column; align-items: center;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .welcome-text { text-align: center; margin-bottom: 30px; animation: fadeInDown 0.8s ease-out forwards; }
        .welcome-text h1 { font-size: 28px; font-weight: 800; margin-bottom: 5px; text-shadow: 0 2px 15px rgba(0,0,0,0.8); }
        .welcome-text p { color: var(--primary); font-size: 14px; font-weight: 600; text-shadow: 0 1px 10px rgba(0,0,0,0.8); }

        .grid {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 15px; 
            width: 100%; 
            max-width: 1000px;
            padding-bottom: 40px;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--card-bg); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px; padding: 25px 10px;
            text-align: center; cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 12px;
            opacity: 0; 
            animation: fadeUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        
        .card:hover { 
            transform: translateY(-8px) scale(1.02);
            background: rgba(100, 255, 218, 0.12); 
            border-color: var(--primary);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 15px rgba(100, 255, 218, 0.2);
        }
        
        .card i { 
            font-size: 32px; filter: drop-shadow(0 0 8px rgba(0,0,0,0.3)); 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover i { transform: scale(1.2) rotate(5deg); }

        .card span { font-size: 11px; font-weight: 800; text-transform: uppercase; color: #fff; letter-spacing: 0.5px; text-shadow: 0 1px 5px rgba(0,0,0,0.5); }

        .c1 { animation-delay: 0.1s; } .c1 i { color: var(--c1); }
        .c2 { animation-delay: 0.15s; } .c2 i { color: var(--c2); }
        .c3 { animation-delay: 0.2s; } .c3 i { color: var(--c3); }
        .c4 { animation-delay: 0.25s; } .c4 i { color: var(--c4); }
        .c5 { animation-delay: 0.3s; } .c5 i { color: var(--c5); }
        .c6 { animation-delay: 0.35s; } .c6 i { color: var(--c6); }
        .c7 { animation-delay: 0.4s; } .c7 i { color: var(--c7); }
        .c8 { animation-delay: 0.45s; } .c8 i { color: var(--c8); }
        .c9 { animation-delay: 0.5s; } .c9 i { color: var(--c9); }
        .c10{ animation-delay: 0.55s; } .c10 i { color: var(--c10); }
        .c11{ animation-delay: 0.6s; } .c11 i { color: var(--c11); }

        #app-view {
            position: fixed; top: 75px; left: 0; width: 100%; height: calc(100vh - 75px);
            background: #fff; display: none; z-index: 500000;
        }
        iframe { width: 100%; height: 100%; border: none; }

        #loader {
            position: fixed; top: 0; left: 0; height: 3px; width: 0;
            background: var(--primary); z-index: 1000000; transition: 0.3s;
        }

        @media (max-width: 480px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .card { padding: 20px 5px; }
            .card i { font-size: 28px; }
            .card span { font-size: 9px; }
            .welcome-text h1 { font-size: 22px; }
            .brand-text b { font-size: 13px; }
            #homeBtn { padding: 8px 12px; font-size: 10px; }
        }
    </style>
</head>
<body>

    <!-- Video Background tetap dipertahankan namun dibuat lebih cerah lewat CSS -->
    <video class="video-bg" autoplay loop muted playsinline>
        <source src="gedung.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div id="loader"></div>

    <header>
        <div class="brand" onclick="tutupHalaman()">
            <img src="https://freeimghost.com/images/2026/01/22/Kabupaten-Bekasi.md.png" alt="Logo">
            <div class="brand-text">
                <b>ROHIMAN SUPRIYADI</b>
                <span>Panitia PSAJ 2026</span>
            </div>
        </div>
        <button id="homeBtn" onclick="tutupHalaman()">
            <i class="fa-solid fa-arrow-left"></i> KEMBALI
        </button>
    </header>

    <main id="dashboard-view">
        <div class="welcome-text">
            <h1 id="salam">Selamat Datang</h1>
            <p id="jam"></p>
        </div>

        <div class="grid">
            <div class="card c1" onclick="bukaHalaman('app-album.html')">
                <i class="fa-solid fa-images"></i>
                <span>Album PSAJ</span>
            </div>
            <div class="card c2" onclick="bukaHalaman('app-ljk.html')">
                <i class="fa-solid fa-file-signature"></i>
                <span>LJK Siswa</span>
            </div>
            <div class="card c3" onclick="bukaHalaman('app-monitoring.html')">
                <i class="fa-solid fa-chart-pie"></i>
                <span>Instrumen</span>
            </div>
            <div class="card c4" onclick="bukaHalaman('https://rohimansupriyadi82-cmd.github.io/aplikasi-cetak-kartu/')">
                <i class="fa-solid fa-address-card"></i>
                <span>Kartu Ujian</span>
            </div>
            <div class="card c5" onclick="window.open('https://imansschool.my.id/aplikasi-nilai/#/login', '_blank')">
                <i class="fa-solid fa-database"></i>
                <span>Olah Nilai</span>
            </div>
            <div class="card c6" onclick="bukaHalaman('app-nomor-meja.html')">
                <i class="fa-solid fa-table-list"></i>
                <span>Meja (V1)</span>
            </div>
            <div class="card c7" onclick="bukaHalaman('app-meja-v2.html')">
                <i class="fa-solid fa-table-cells"></i>
                <span>Meja (V2)</span>
            </div>
            <div class="card c8" onclick="bukaHalaman('tanda terima honor.html')">
                <i class="fa-solid fa-file-invoice-dollar"></i>
                <span>Terima Honor</span>
            </div>
            <div class="card c9" onclick="bukaHalaman('absen.html')">
                <i class="fa-solid fa-clipboard-user"></i>
                <span>Absen Guru</span>
            </div>
            <div class="card c10" onclick="bukaHalaman('absen_murid.html')">
                <i class="fa-solid fa-clipboard-list"></i>
                <span>Absen Siswa</span>
            </div>
            <div class="card c11" onclick="window.open('https://rohimansupriyadi82-cmd.github.io/Kartu_MPLS_2026/', '_blank')">
                <i class="fa-solid fa-id-badge"></i>
                <span>Kartu MPLS</span>
            </div>
        </div>
    </main>

    <div id="app-view">
        <iframe id="layarApp" src=""></iframe>
    </div>

    <script>
        const appLayar = document.getElementById('app-view');
        const frame = document.getElementById('layarApp');
        const homeBtn = document.getElementById('homeBtn');
        const loader = document.getElementById('loader');

        function bukaHalaman(url) {
            loader.style.width = '40%';
            frame.onload = function() {
                loader.style.width = '100%';
                setTimeout(() => {
                    loader.style.width = '0';
                    appLayar.style.display = 'block'; 
                    homeBtn.style.display = 'block'; 
                }, 300);
            };
            frame.src = url;
        }

        function tutupHalaman() {
            frame.onload = null; 
            appLayar.style.display = 'none'; 
            homeBtn.style.display = 'none';  
            frame.src = 'about:blank';       
        }

        function updateJam() {
            const n = new Date();
            const h = n.getHours();
            let s = "Selamat Malam";
            if(h < 11) s = "Selamat Pagi";
            else if(h < 15) s = "Selamat Siang";
            else if(h < 19) s = "Selamat Sore";
            document.getElementById('salam').innerText = s + ", Rekan Guru";
            document.getElementById('jam').innerText = n.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'}) + " | " + n.toLocaleTimeString('id-ID');
        }
        setInterval(updateJam, 1000);
        updateJam();
    </script>
</body>
</html>

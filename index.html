<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Admin - Rohiman Supriyadi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Palette: Midnight Deep Teal */
            --bg-dark: #060d13;
            --primary-teal: #0d1f23;
            --accent-neon: #64ffda; /* Hijau Mint Neon */
            --glass-white: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-silver: #e2e8f0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* Background Mesh Gradient yang Mewah */
            background: radial-gradient(circle at top right, #102a2d, #060d13);
        }

        /* Pattern halus di background */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2364ffda' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* HEADER DASHBOARD */
        .top-nav {
            flex-shrink: 0;
            background: rgba(6, 13, 19, 0.8);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 12px 20px;
            z-index: 2000;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        @media (min-width: 992px) {
            .top-nav {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                height: 90px;
                padding: 0 40px;
            }
        }

        /* BRANDING */
        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand img { 
            height: 40px; 
            filter: drop-shadow(0 0 10px rgba(100, 255, 218, 0.3));
        }

        .brand-text h1 { 
            font-size: 14px; 
            margin: 0; 
            color: var(--text-silver);
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-weight: 700;
            opacity: 0.8;
        }

        .brand-text b {
            color: #ffffff;
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            display: block;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* NAVIGASI HORIZONTAL SCROLL */
        .nav-links {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 5px 2px 12px 2px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .nav-links::-webkit-scrollbar { display: none; }

        .nav-item {
            flex: 0 0 auto;
            padding: 10px 20px;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-weight: 700;
            font-size: 10px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            background: var(--glass-white);
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .nav-item i { 
            font-size: 18px; 
        }

        .nav-item:hover {
            color: var(--accent-neon);
            border-color: var(--accent-neon);
            background: rgba(100, 255, 218, 0.05);
        }

        .nav-item.active {
            background: rgba(100, 255, 218, 0.1);
            color: var(--accent-neon);
            border-color: var(--accent-neon);
            box-shadow: 0 0 15px rgba(100, 255, 218, 0.2);
        }

        /* IFRAME CONTAINER */
        .main-container {
            flex-grow: 1;
            background: #ffffff; /* Konten aplikasi tetap putih agar mudah dibaca */
            width: 100%;
            height: 100%;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Progress Bar Animasi */
        .progress-line {
            position: absolute;
            top: 0; left: 0; height: 3px;
            background: var(--accent-neon);
            width: 0;
            z-index: 3000;
            transition: 0.4s ease;
            box-shadow: 0 0 10px var(--accent-neon);
        }

        @media print {
            .top-nav { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="loader" class="progress-line"></div>

    <header class="top-nav">
        <div class="brand">
            <img src="https://freeimghost.com/images/2026/01/22/Kabupaten-Bekasi.md.png" alt="Logo">
            <div class="brand-text">
                <h1>PANITIA PSAJ 2026</h1>
                <b>Rohiman Supriyadi</b>
            </div>
        </div>

        <nav class="nav-links">
            <a href="javascript:void(0)" onclick="loadApp('app-album.html', this)" class="nav-item active">
                <i class="fa-solid fa-layer-group"></i>
                <span>Album</span>
            </a>
            <a href="javascript:void(0)" onclick="loadApp('app-ljk.html', this)" class="nav-item">
                <i class="fa-solid fa-file-pen"></i>
                <span>LJK</span>
            </a>
            <a href="javascript:void(0)" onclick="loadApp('app-monitoring.html', this)" class="nav-item">
                <i class="fa-solid fa-chart-pie"></i>
                <span>INSTR-PSAJ</span>
            </a>
            <a href="javascript:void(0)" onclick="loadApp('https://rohimansupriyadi82-cmd.github.io/aplikasi-cetak-kartu/', this)" class="nav-item">
                <i class="fa-solid fa-address-card"></i>
                <span>Kartu</span>
            </a>
            <a href="javascript:void(0)" onclick="loadApp('https://imanschool.my.id/aplikasi-nilai/#/login', this)" class="nav-item">
                <i class="fa-solid fa-database"></i>
                <span>Nilai</span>
            </a>
            <a href="javascript:void(0)" onclick="loadApp('app-meja-v2.html', this)" class="nav-item">
                <i class="fa-solid fa-border-all"></i>
                <span>Meja V2</span>
            </a>
            <a href="javascript:void(0)" onclick="loadApp('app-nomor-meja.html', this)" class="nav-item">
                <i class="fa-solid fa-hashtag"></i>
                <span>No Meja</span>
            </a>
        </nav>
    </header>

    <main class="main-container">
        <iframe id="content-frame" src="app-album.html" allow="print"></iframe>
    </main>

    <script>
        function loadApp(url, element) {
            const frame = document.getElementById('content-frame');
            const loader = document.getElementById('loader');
            
            loader.style.width = '40%';
            frame.style.opacity = '0.5';
            frame.src = url;

            frame.onload = function() {
                loader.style.width = '100%';
                setTimeout(() => { 
                    loader.style.width = '0';
                    frame.style.opacity = '1';
                }, 400);
            };
            
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            element.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }
    </script>
</body>
</html>

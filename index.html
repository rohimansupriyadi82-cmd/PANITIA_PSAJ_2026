<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Administrasi Ujian - Rohiman Supriyadi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome untuk Icon Realistis -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Tema Candy Red Neon */
            --candy-dark: #3a0000;
            --candy-red: #8B0000;
            --candy-bright: #e60000;
            --neon-glow: rgba(255, 20, 20, 0.4);
            --accent: #ff4d4d;
            --bg-gray: #f8fafc;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden; 
            background-color: var(--candy-dark);
        }

        /* HEADER DASHBOARD DENGAN EFEK GLASSMORPHISM */
        .top-nav {
            height: 90px;
            background: linear-gradient(135deg, var(--candy-dark) 0%, var(--candy-red) 100%);
            display: flex;
            flex-direction: column; /* Stack on mobile for brand vs menu */
            justify-content: center;
            padding: 5px 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 15px var(--neon-glow);
            z-index: 2000;
            position: relative;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        @media (min-width: 768px) {
            .top-nav {
                height: 85px;
                flex-direction: row;
                align-items: center;
                padding: 0 30px;
            }
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            flex-shrink: 0;
            margin-bottom: 5px;
        }

        @media (min-width: 768px) {
            .brand { margin-bottom: 0; min-width: 280px; }
        }

        .brand img { 
            height: 35px; 
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
        }
        
        @media (min-width: 768px) { .brand img { height: 50px; } }
        
        .brand h1 { 
            font-size: 14px; 
            margin: 0; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            font-weight: 800;
            text-shadow: 0 0 10px var(--neon-glow);
        }

        /* Nama Rohiman Supriyadi (Putih Tebal) */
        .brand small {
            color: #ffffff;
            font-weight: 800;
            font-size: 10px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            display: block;
            margin-top: 1px;
        }

        /* MENU UTAMA - Responsif Horizontal Scroll */
        .nav-links {
            display: flex;
            gap: 8px;
            overflow-x: auto; /* Aktifkan geser horizontal */
            overflow-y: hidden;
            padding: 5px 0;
            width: 100%;
            -webkit-overflow-scrolling: touch; /* Halus saat di-swipe di iPhone */
            scrollbar-width: none; /* Sembunyikan scrollbar di Firefox */
        }

        /* Sembunyikan scrollbar di Chrome/Safari */
        .nav-links::-webkit-scrollbar { display: none; }

        .nav-item {
            padding: 8px 12px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-weight: 700;
            font-size: 10px;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            text-transform: uppercase;
            white-space: nowrap; /* Mencegah teks turun ke bawah */
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-width: 70px;
        }

        @media (min-width: 768px) {
            .nav-item {
                padding: 12px 18px;
                font-size: 11px;
                min-width: auto;
            }
        }

        .nav-item i {
            font-size: 14px;
        }

        @media (min-width: 768px) { .nav-item i { font-size: 18px; } }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            transform: translateY(-2px);
        }

        .nav-item.active {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--neon-glow);
        }

        .nav-item.active i {
            color: var(--accent);
            filter: drop-shadow(0 0 5px var(--accent));
        }

        /* CONTAINER IFRAME */
        .main-container {
            width: 100%;
            height: calc(100vh - 105px); /* Sesuaikan dengan tinggi header mobile */
            background: var(--bg-gray);
            position: relative;
        }

        @media (min-width: 768px) {
            .main-container { height: calc(100vh - 85px); }
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media print {
            .top-nav { display: none !important; }
            .main-container { height: 100vh; }
        }
    </style>
</head>
<body>

    <header class="top-nav">
        <div class="brand">
            <img src="https://freeimghost.com/images/2026/01/22/Kabupaten-Bekasi.md.png" alt="Logo">
            <div>
                <h1>ADMIN PSAJ 2026</h1>
                <small>Rohiman Supriyadi</small>
            </div>
        </div>

        <nav class="nav-links">
            <a href="javascript:void(0)" onclick="loadApp('app-album.html', this)" class="nav-item active">
                <i class="fa-solid fa-images"></i>
                <span>Album</span>
            </a>
            <a href="javascript:void(0)" onclick="loadApp('app-ljk.html', this)" class="nav-item">
                <i class="fa-solid fa-file-signature"></i>
                <span>LJK</span>
            </a>
            <a href="javascript:void(0)" onclick="loadApp('app-monitoring.html', this)" class="nav-item">
                <i class="fa-solid fa-clipboard-check"></i>
                <span>Monitor</span>
            </a>
            <a href="javascript:void(0)" onclick="loadApp('https://rohimansupriyadi82-cmd.github.io/aplikasi-cetak-kartu/', this)" class="nav-item">
                <i class="fa-solid fa-id-card"></i>
                <span>Kartu</span>
            </a>
            <a href="javascript:void(0)" onclick="loadApp('https://imanschool.my.id/aplikasi-nilai/#/login', this)" class="nav-item">
                <i class="fa-solid fa-chart-line"></i>
                <span>Nilai</span>
            </a>
            <a href="javascript:void(0)" onclick="loadApp('app-meja-v2.html', this)" class="nav-item">
                <i class="fa-solid fa-table-cells"></i>
                <span>Meja V2</span>
            </a>
            <a href="javascript:void(0)" onclick="loadApp('app-nomor-meja.html', this)" class="nav-item">
                <i class="fa-solid fa-list-ol"></i>
                <span>No Meja</span>
            </a>
        </nav>
    </header>

    <div class="main-container">
        <iframe id="content-frame" src="app-album.html" allow="print"></iframe>
    </div>

    <script>
        function loadApp(url, element) {
            document.getElementById('content-frame').src = url;
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.remove('active');
            });
            element.classList.add('active');
            
            // Otomatis geser menu agar item yang diklik terlihat di tengah (opsional)
            element.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }

        window.onbeforeunload = function() {
            return "Sistem mendeteksi aktivitas input. Pastikan data Anda sudah aman.";
        };
    </script>
</body>
</html>

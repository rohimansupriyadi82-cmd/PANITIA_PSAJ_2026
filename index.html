<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Mandiri - Rohiman Supriyadi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #64ffda;
            --c1: #00d2ff; --c2: #00ff87; --c3: #ff007a;
            --c4: #f6d365; --c5: #a18cd1; --c6: #00f2fe; --c7: #ffa502;
            --c8: #ff6b81; --c9: #7bed9f; --c10: #70a1ff; --c11: #ff9f43;
            --c12: #ff4757; --c13: #0fbcf9; --c14: #e056fd;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            height: 100vh; width: 100vw;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: transparent; 
            color: #fff; overflow-x: hidden;
        }

        /* VIDEO BACKGROUND TETAP CERAH */
        .video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; 
            z-index: -10;
            filter: brightness(1.1) contrast(1.05);
        }

        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--primary);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; z-index: 1000;
        }

        .brand { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .brand img { height: 35px; }
        .brand-text b { font-size: 16px; display: block; color: #fff; text-shadow: 2px 2px 8px rgba(0,0,0,0.5); }
        .brand-text span { color: var(--primary); font-size: 10px; font-weight: 800; text-transform: uppercase; }

        #dashboard-view {
            padding-top: 90px; padding-bottom: 40px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        .welcome-text { text-align: center; margin-bottom: 30px; }
        .welcome-text h1 { 
            font-size: 28px; font-weight: 800; 
            text-shadow: 2px 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 8px;
        }
        .welcome-text p { 
            background: rgba(255,255,255,0.2); padding: 6px 20px; border-radius: 50px;
            backdrop-filter: blur(10px); border: 1px solid var(--primary);
            color: #fff; font-weight: 700; font-size: 13px;
        }

        .grid-container {
            display: flex; justify-content: center; width: 100%; max-width: 1100px; padding: 15px;
        }

        .honeycomb-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            width: 100%;
        }

        /* KARTU MENU - Glassmorphism agar teks jelas di atas video cerah */
        .card {
            background: rgba(255, 255, 255, 0.15); 
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            padding: 20px 10px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 10px; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }

        .card.main { grid-column: span 2; grid-row: span 2; background: rgba(255, 255, 255, 0.2); }
        .card.wide { grid-column: span 2; }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            background: rgba(255, 255, 255, 0.3);
            border-color: var(--glow-color);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2), 0 0 20px var(--glow-color);
        }

        .card i { font-size: 28px; filter: drop-shadow(0 0 8px var(--glow-color)); transition: 0.3s; }
        .card span { font-size: 11px; font-weight: 800; letter-spacing: 0.5px; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); color: #fff; }

        /* WARNA IKON */
        .c1 { --glow-color: var(--c1); } .c1 i { color: var(--c1); }
        .c2 { --glow-color: var(--c2); } .c2 i { color: var(--c2); }
        .c3 { --glow-color: var(--c3); } .c3 i { color: var(--c3); }
        .c4 { --glow-color: var(--c4); } .c4 i { color: var(--c4); }
        .c5 { --glow-color: var(--c5); } .c5 i { color: var(--c5); }
        .c6 { --glow-color: var(--c6); } .c6 i { color: var(--c6); }
        .c7 { --glow-color: var(--c7); } .c7 i { color: var(--c7); }
        .c8 { --glow-color: var(--c8); } .c8 i { color: var(--c8); }
        .c9 { --glow-color: var(--c9); } .c9 i { color: var(--c9); }
        .c10{ --glow-color: var(--c10); } .c10 i { color: var(--c10); }
        .c11{ --glow-color: var(--c11); } .c11 i { color: var(--c11); }
        .c12{ --glow-color: var(--c12); } .c12 i { color: var(--c12); }
        .c13{ --glow-color: var(--c13); } .c13 i { color: var(--c13); }
        .c14{ --glow-color: var(--c14); } .c14 i { color: var(--c14); }

        #homeBtn {
            background: #ff4757; color: #fff; border: none; padding: 10px 20px;
            border-radius: 50px; font-weight: 800; cursor: pointer; display: none;
            font-size: 11px; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }

        #app-view {
            position: fixed; top: 70px; left: 0; width: 100%; height: calc(100vh - 70px);
            background: #fff; display: none; z-index: 9999;
        }
        iframe { width: 100%; height: 100%; border: none; }

        #loader {
            position: fixed; top: 0; left: 0; height: 3px; width: 0;
            background: var(--primary); z-index: 10000; transition: 0.3s;
        }

        @media (max-width: 768px) {
            .honeycomb-grid { grid-template-columns: repeat(3, 1fr); }
            .card.main { grid-column: span 2; }
            .welcome-text h1 { font-size: 22px; }
        }
    </style>
</head>
<body onclick="putarMusik()"> <!-- Klik di mana saja untuk aktifkan musik -->

    <!-- AUDIO ELEMENT -->
    <audio id="bgMusic" loop>
        <source src="suara.mp3" type="audio/mpeg">
    </audio>

    <video class="video-bg" autoplay loop muted playsinline>
        <source src="gedung.mp4" type="video/mp4">
    </video>
    
    <div id="loader"></div>

    <header>
        <div class="brand" onclick="tutupHalaman()">
            <img src="https://freeimghost.com/images/2026/01/22/Kabupaten-Bekasi.md.png" alt="Logo">
            <div class="brand-text">
                <b>ROHIMAN SUPRIYADI</b>
                <span>Kumpulan Aplikasi Mandiri</span>
            </div>
        </div>
        <button id="homeBtn" onclick="tutupHalaman()">
            <i class="fa-solid fa-arrow-left"></i> KEMBALI
        </button>
    </header>

    <main id="dashboard-view">
        <div class="welcome-text">
            <h1 id="salam">Selamat Datang</h1>
            <p id="jam"></p>
        </div>

        <div class="grid-container">
            <div class="honeycomb-grid">
                <div class="card c1 main" onclick="bukaHalaman('app-album.html')">
                    <i class="fa-solid fa-images"></i>
                    <span>ALBUM PSAJ</span>
                </div>
                <div class="card c2" onclick="bukaHalaman('app-ljk.html')">
                    <i class="fa-solid fa-file-signature"></i>
                    <span>LJK SISWA</span>
                </div>
                <div class="card c3" onclick="bukaHalaman('app-monitoring.html')">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span>INSTRUMEN</span>
                </div>
                <div class="card c4 wide" onclick="bukaHalaman('https://rohimansupriyadi82-cmd.github.io/aplikasi-cetak-kartu/')">
                    <i class="fa-solid fa-address-card"></i>
                    <span>KARTU UJIAN</span>
                </div>
                <div class="card c5" onclick="window.open('https://imanschool.my.id/aplikasi-nilai/#/login', '_blank')">
                    <i class="fa-solid fa-database"></i>
                    <span>OLAH NILAI</span>
                </div>
                <div class="card c6" onclick="bukaHalaman('app-nomor-meja.html')">
                    <i class="fa-solid fa-table-list"></i>
                    <span>MEJA (V1)</span>
                </div>
                <div class="card c7" onclick="bukaHalaman('app-meja-v2.html')">
                    <i class="fa-solid fa-table-cells"></i>
                    <span>MEJA (V2)</span>
                </div>
                <div class="card c8 main" onclick="bukaHalaman('tanda-terima-honor.html')">
                    <i class="fa-solid fa-file-invoice-dollar"></i>
                    <span>TERIMA HONOR</span>
                </div>
                <div class="card c9" onclick="bukaHalaman('absen.html')">
                    <i class="fa-solid fa-clipboard-user"></i>
                    <span>ABSEN GURU</span>
                </div>
                <div class="card c10" onclick="bukaHalaman('absen_murid.html')">
                    <i class="fa-solid fa-clipboard-list"></i>
                    <span>ABSEN SISWA</span>
                </div>
                <div class="card c11 wide" onclick="window.open('https://rohimansupriyadi82-cmd.github.io/Kartu_MPLS_2026/', '_blank')">
                    <i class="fa-solid fa-id-badge"></i>
                    <span>KARTU MPLS</span>
                </div>
                <div class="card c12" onclick="window.open('https://rohimansupriyadi82-cmd.github.io/Saber_Pungli_2026/', '_blank')">
                    <i class="fa-solid fa-shield-virus"></i>
                    <span>SABER PUNGLI</span>
                </div>
                <div class="card c13" onclick="window.open('https://rohimansupriyadi82-cmd.github.io/Kartu-Panitia-Kegiatan/', '_blank')">
                    <i class="fa-solid fa-id-card-clip"></i>
                    <span>KARTU PANITIA</span>
                </div>
                <div class="card c14" onclick="window.open('https://imanschool.my.id/cek-usia-spmb.imanschool.my.id/', '_blank')">
                    <i class="fa-solid fa-calendar-check"></i>
                    <span>CEK USIA SPMB</span>
                </div>
            </div>
        </div>
    </main>

    <div id="app-view">
        <iframe id="layarApp" src=""></iframe>
    </div>

    <script>
        const appLayar = document.getElementById('app-view');
        const frame = document.getElementById('layarApp');
        const homeBtn = document.getElementById('homeBtn');
        const loader = document.getElementById('loader');
        const musik = document.getElementById('bgMusic');

        // Fungsi untuk memutar musik (dipanggil saat klik layar)
        function putarMusik() {
            musik.play().catch(e => console.log("Menunggu interaksi pengguna..."));
        }

        function bukaHalaman(url) {
            putarMusik(); // Pastikan musik jalan saat klik menu
            loader.style.width = '40%';
            frame.onload = function() {
                loader.style.width = '100%';
                setTimeout(() => {
                    loader.style.width = '0';
                    appLayar.style.display = 'block'; 
                    homeBtn.style.display = 'block'; 
                }, 300);
            };
            frame.src = url;
        }

        function tutupHalaman() {
            frame.onload = null; 
            appLayar.style.display = 'none'; 
            homeBtn.style.display = 'none';  
            frame.src = 'about:blank';       
        }

        function updateJam() {
            const n = new Date();
            const h = n.getHours();
            let s = "Selamat Malam";
            if(h < 11) s = "Selamat Pagi";
            else if(h < 15) s = "Selamat Siang";
            else if(h < 19) s = "Selamat Sore";
            document.getElementById('salam').innerText = s + ", Rekan Guru";
            document.getElementById('jam').innerText = n.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'}) + " | " + n.toLocaleTimeString('id-ID');
        }
        setInterval(updateJam, 1000);
        updateJam();
    </script>
</body>
</html>

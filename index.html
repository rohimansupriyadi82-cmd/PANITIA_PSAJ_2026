<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin PSAJ - Rohiman Supriyadi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --candy-dark: #3a0000;
            --candy-red: #8B0000;
            --neon-glow: rgba(255, 20, 20, 0.4);
            --accent: #ff4d4d;
            --bg-gray: #f1f5f9;
        }

        /* Full Screen Flex Layout */
        body, html {
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            flex-direction: column; /* Header di atas, Konten di bawah */
            overflow: hidden;
            background-color: var(--candy-dark);
        }

        /* HEADER DASHBOARD */
        .top-nav {
            flex-shrink: 0; /* Header tidak boleh mengecil */
            background: linear-gradient(135deg, var(--candy-dark) 0%, var(--candy-red) 100%);
            padding: 10px 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 2000;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        @media (min-width: 768px) {
            .top-nav {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 10px 30px;
                height: 80px;
            }
        }

        /* BRAND SECTION */
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        @media (min-width: 768px) {
            .brand { margin-bottom: 0; }
        }

        .brand img { 
            height: 35px; 
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.4));
        }
        
        .brand-text h1 { 
            font-size: 14px; 
            margin: 0; 
            color: white;
            text-transform: uppercase; 
            letter-spacing: 1px;
            font-weight: 800;
            text-shadow: 0 0 10px var(--neon-glow);
        }

        .brand-text small {
            color: #ffffff; /* Nama Rohiman Supriyadi Putih */
            font-weight: 800;
            font-size: 11px;
            text-transform: uppercase;
            display: block;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* MENU NAVIGASI - SCROLLABLE */
        .nav-links {
            display: flex;
            gap: 10px;
            overflow-x: auto; /* Aktifkan geser kanan-kiri */
            overflow-y: hidden;
            padding: 5px 2px 10px 2px;
            scrollbar-width: none; /* Sembunyikan scrollbar Firefox */
            -webkit-overflow-scrolling: touch;
        }

        .nav-links::-webkit-scrollbar { display: none; } /* Sembunyikan scrollbar Chrome */

        .nav-item {
            flex: 0 0 auto; /* Item tidak boleh gepeng/menyusut */
            padding: 10px 15px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-weight: 700;
            font-size: 10px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            min-width: 75px;
        }

        .nav-item i { font-size: 16px; }

        .nav-item.active {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--neon-glow);
        }

        .nav-item.active i { color: var(--accent); }

        /* CONTAINER APLIKASI (IFRAME) */
        .main-container {
            flex-grow: 1; /* Mengisi seluruh sisa ruang layar */
            background: var(--bg-gray);
            width: 100%;
            height: 100%; /* Penting agar iframe muncul */
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        @media print {
            .top-nav { display: none !important; }
            body { height: auto; overflow: visible; }
        }
    </style>
</head>
<body>

    <header class="top-nav">
        <div class="brand">
            <img src="https://freeimghost.com/images/2026/01/22/Kabupaten-Bekasi.md.png" alt="Logo">
            <div class="brand-text">
                <h1>ADMIN PSAJ 2026</h1>
                <small>Rohiman Supriyadi</small>
            </div>
        </div>

        <nav class="nav-links">
            <a href="javascript:void(0)" onclick="loadApp('app-album.html', this)" class="nav-item active">
                <i class="fa-solid fa-images"></i>
                <span>Album</span>
            </a>
            <a href="javascript:void(0)" onclick="loadApp('app-ljk.html', this)" class="nav-item">
                <i class="fa-solid fa-file-signature"></i>
                <span>LJK</span>
            </a>
            <a href="javascript:void(0)" onclick="loadApp('app-monitoring.html', this)" class="nav-item">
                <i class="fa-solid fa-clipboard-check"></i>
                <span>Monitor</span>
            </a>
            <a href="javascript:void(0)" onclick="loadApp('https://rohimansupriyadi82-cmd.github.io/aplikasi-cetak-kartu/', this)" class="nav-item">
                <i class="fa-solid fa-id-card"></i>
                <span>Kartu</span>
            </a>
            <a href="javascript:void(0)" onclick="loadApp('https://imanschool.my.id/aplikasi-nilai/#/login', this)" class="nav-item">
                <i class="fa-solid fa-chart-line"></i>
                <span>Nilai</span>
            </a>
            <a href="javascript:void(0)" onclick="loadApp('app-meja-v2.html', this)" class="nav-item">
                <i class="fa-solid fa-table-cells"></i>
                <span>Meja V2</span>
            </a>
            <a href="javascript:void(0)" onclick="loadApp('app-nomor-meja.html', this)" class="nav-item">
                <i class="fa-solid fa-list-ol"></i>
                <span>No Meja</span>
            </a>
        </nav>
    </header>

    <!-- Kontainer Iframe yang akan selalu mengisi sisa layar -->
    <main class="main-container">
        <iframe id="content-frame" src="app-album.html" allow="print"></iframe>
    </main>

    <script>
        function loadApp(url, element) {
            document.getElementById('content-frame').src = url;
            
            // Hapus class active dari semua menu
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Tambah class active ke menu yang diklik
            element.classList.add('active');
            
            // Scroll otomatis ke tengah saat item diklik (untuk mobile)
            element.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }

        // Mencegah kehilangan data
        window.onbeforeunload = function() {
            return "Sistem mendeteksi aktivitas input. Pastikan data Anda sudah aman.";
        };
    </script>
</body>
</html>
